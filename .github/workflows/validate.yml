name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"
      - name: Run scanner tests
        run: python3 -m unittest discover -s scripts/tests -v
      - name: Check JSON output
        run: python3 scripts/app_store_review_scan.py . --format json | python3 -m json.tool >/dev/null
      - name: Check portable archive
        run: unzip -t app-store-review-skill.skill
