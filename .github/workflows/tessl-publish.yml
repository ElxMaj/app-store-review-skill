name: Publish to Tessl

on:
  push:
    branches: [main]
    paths:
      - ".tessl-plugin/**"
      - "SKILL.md"
      - "references/**"
      - "scripts/**"
      - "copilot-plugin/skills/app-store-review/**"
      - "evals/**"
      - "tessl.json"
      - ".github/workflows/tessl-publish.yml"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: tessl-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    if: github.repository_owner == 'ElxMaj'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: tesslio/setup-tessl@25ec223fc0da33b41b8044ff5ab2b85235f4f91e # v2
        with:
          token: ${{ secrets.TESSL_TOKEN }}
      - name: Validate Tessl plugin
        run: tessl plugin lint .
      - name: Publish plugin and run evaluations
        run: tessl plugin publish . --with-scenario-quality-check
