<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="460" viewBox="0 0 1400 460" role="img" aria-labelledby="title desc">
  <title id="title">Three App Store review modes</title>
  <desc id="desc">A read-only first pass routes into pre-submission audit, rejection recovery, or human-craft audit, then produces an evidence-tagged report before any approved fixes.</desc>
  <defs>
    <style>
      .sans { font-family: Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .mono { font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace; }
      .eyebrow { font-size: 17px; font-weight: 700; letter-spacing: 2px; }
      .heading { font-size: 29px; font-weight: 720; }
      .copy { font-size: 18px; fill: #5b606a; }
      .step { font-size: 15px; font-weight: 700; letter-spacing: 1px; }
    </style>
    <filter id="shadow" x="-10%" y="-10%" width="125%" height="130%">
      <feDropShadow dx="0" dy="5" stdDeviation="0" flood-color="#171717" flood-opacity="0.10"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0L10 5L0 10Z" fill="#171717"/>
    </marker>
  </defs>

  <rect width="1400" height="460" fill="#f7f5ef"/>
  <text x="60" y="52" class="mono eyebrow" fill="#171717">ONE FRONT DOOR</text>
  <text x="1340" y="52" text-anchor="end" class="mono" font-size="16" fill="#737781">REPORT FIRST. FIX ONLY WITH APPROVAL.</text>
  <path d="M60 70H1340" stroke="#d7d3ca" stroke-width="2"/>

  <g filter="url(#shadow)">
    <rect x="60" y="94" width="400" height="238" rx="8" fill="#fffdf8" stroke="#171717" stroke-width="2"/>
    <rect x="60" y="94" width="10" height="238" rx="5" fill="#2563eb"/>
  </g>
  <circle cx="112" cy="143" r="24" fill="#e7edff" stroke="#2563eb" stroke-width="2"/>
  <path d="M101 143l8 8 15-18" fill="none" stroke="#2563eb" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="151" y="134" class="mono eyebrow" fill="#2563eb">MODE A</text>
  <text x="151" y="166" class="sans heading" fill="#171717">Pre-submission</text>
  <text x="96" y="209" class="sans copy">Find blockers before upload.</text>
  <g class="mono step" fill="#171717">
    <rect x="96" y="240" width="88" height="36" rx="4" fill="#e7edff"/><text x="140" y="263" text-anchor="middle">SCAN</text>
    <path d="M191 258H220" stroke="#171717" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="231" y="240" width="88" height="36" rx="4" fill="#f2f0ea"/><text x="275" y="263" text-anchor="middle">VERIFY</text>
    <path d="M326 258H355" stroke="#171717" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="366" y="240" width="66" height="36" rx="4" fill="#f2f0ea"/><text x="399" y="263" text-anchor="middle">NOTE</text>
  </g>
  <text x="96" y="307" class="mono" font-size="15" fill="#737781">Xcode · Expo · React Native · Flutter</text>

  <g filter="url(#shadow)">
    <rect x="500" y="94" width="400" height="238" rx="8" fill="#fffdf8" stroke="#171717" stroke-width="2"/>
    <rect x="500" y="94" width="10" height="238" rx="5" fill="#e85d4a"/>
  </g>
  <rect x="536" y="119" width="48" height="48" rx="5" fill="#fae7e2" stroke="#e85d4a" stroke-width="2"/>
  <path d="M548 143h24M560 131v24" stroke="#e85d4a" stroke-width="3" transform="rotate(45 560 143)"/>
  <text x="599" y="134" class="mono eyebrow" fill="#e85d4a">MODE B</text>
  <text x="599" y="166" class="sans heading" fill="#171717">Rejection recovery</text>
  <text x="536" y="209" class="sans copy">Turn Apple’s wording into the next move.</text>
  <g class="mono step" fill="#171717">
    <rect x="536" y="240" width="82" height="36" rx="4" fill="#fae7e2"/><text x="577" y="263" text-anchor="middle">FIX</text>
    <rect x="629" y="240" width="102" height="36" rx="4" fill="#f2f0ea"/><text x="680" y="263" text-anchor="middle">CLARIFY</text>
    <rect x="742" y="240" width="94" height="36" rx="4" fill="#f2f0ea"/><text x="789" y="263" text-anchor="middle">APPEAL</text>
  </g>
  <text x="536" y="307" class="mono" font-size="15" fill="#737781">4.3 playbook · reply · evidence packet</text>

  <g filter="url(#shadow)">
    <rect x="940" y="94" width="400" height="238" rx="8" fill="#fffdf8" stroke="#171717" stroke-width="2"/>
    <rect x="940" y="94" width="10" height="238" rx="5" fill="#16856b"/>
  </g>
  <rect x="976" y="119" width="48" height="48" rx="5" fill="#e1f1eb" stroke="#16856b" stroke-width="2"/>
  <path d="M987 154v-20M998 154v-12M1009 154v-27" stroke="#16856b" stroke-width="4" stroke-linecap="round"/>
  <text x="1039" y="134" class="mono eyebrow" fill="#16856b">MODE C</text>
  <text x="1039" y="166" class="sans heading" fill="#171717">Human-craft audit</text>
  <text x="976" y="209" class="sans copy">Audit what reviewers can actually see.</text>
  <g class="mono step" fill="#171717">
    <rect x="976" y="240" width="102" height="36" rx="4" fill="#e1f1eb"/><text x="1027" y="263" text-anchor="middle">PRODUCT</text>
    <rect x="1089" y="240" width="108" height="36" rx="4" fill="#f2f0ea"/><text x="1143" y="263" text-anchor="middle">PROVENANCE</text>
    <rect x="1208" y="240" width="96" height="36" rx="4" fill="#f2f0ea"/><text x="1256" y="263" text-anchor="middle">CRAFT</text>
  </g>
  <text x="976" y="307" class="mono" font-size="15" fill="#737781">States · accessibility · product page</text>

  <path d="M166 377H1233" stroke="#171717" stroke-width="2" marker-end="url(#arrow)"/>
  <circle cx="166" cy="377" r="9" fill="#2563eb" stroke="#f7f5ef" stroke-width="4"/>
  <circle cx="700" cy="377" r="9" fill="#e85d4a" stroke="#f7f5ef" stroke-width="4"/>
  <circle cx="1233" cy="377" r="9" fill="#16856b" stroke="#f7f5ef" stroke-width="4"/>
  <text x="60" y="421" class="mono step" fill="#737781">READ ONLY</text>
  <text x="700" y="421" text-anchor="middle" class="mono step" fill="#171717">MARKDOWN + JSON + VISUAL HTML</text>
  <text x="1340" y="421" text-anchor="end" class="mono step" fill="#737781">APPROVED FIX GROUPS</text>
</svg>
